<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias | Restaurante</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <h1>Delicias</h1>
            <div class="delivery-badge"><i class="ph ph-moped"></i> 15-30 min</div>
        </div>
        <div class="search-container">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Buscar en el menú...">
        </div>
    </header>

    <nav class="categories-nav" id="categories-container">
        </nav>

    <main class="menu-container" id="menu-grid">
        </main>

    <div id="cart-floating-btn" class="cart-btn hidden">
        <div class="cart-btn-content">
            <span id="cart-count">0</span>
            <span>Ver Carrito</span>
            <span id="cart-total">$0.00</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
