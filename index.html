<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delicias</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🍛 Delicias</h1>

    <input 
      id="search" 
      class="search" 
      placeholder="Buscar comida..."
    />
  </header>

  <!-- CATEGORÍAS -->
  <div class="categories">
    <button data-category="all">Todo</button>
    <button data-category="food">Comida</button>
    <button data-category="combo">Combos</button>
    <button data-category="drink">Bebidas</button>
  </div>

  <!-- MENÚ -->
  <main id="menu-list" class="menu"></main>

  <!-- BOTÓN CHECKOUT -->
  <button id="checkout-btn" class="checkout-btn">
    Ver pedido
  </button>

  <!-- SCRIPTS -->
  <script src="app.js"></script>

</body>
</html>
